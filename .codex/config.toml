model = "gpt-5.4"
approval_policy = "never"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"
model_instructions_file = "codex/instructions/harness.txt"
web_search = "cached"

[sandbox_workspace_write]
network_access = true

[agents]
max_threads = 6
max_depth = 2

[history]
persistence = "save-all"
