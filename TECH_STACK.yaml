suite_program:
  positioning: protocol-suite
  incubation: sardis-incubated-neutral-by-design
  immediate_public_outputs:
  - charter
  - suite architecture
  - core foundation draft
  - governance process
  - reference slice
reference_monorepo:
  package_manager: pnpm
  language: TypeScript
  build: tsc
  workspace: pnpm-workspace.yaml
  role: MCP-oriented reference slice and proving ground
reference_packages:
  '@oaps/core':
  - shared contracts
  - ids
  - canonical JSON serializer
  - version negotiation helpers
  - auth binding checks
  '@oaps/evidence':
  - sha256 hashing
  - hash-linked chain builder
  - chain verifier
  '@oaps/policy':
  - oaps-policy-v1 evaluator
  - policy context builder
  - evaluation result typing
  '@oaps/mcp-adapter':
  - MCP capability mapping
  - policy enforcement before tool call
  - evidence sidecar emission
  - error translation
  '@oaps/http':
  - HTTP reference surface for the current slice
  - well-known discovery
  - interaction endpoints
  - approval endpoints
  - evidence endpoints
planned_suite_tracks:
  core:
  - actor, capability, intent, task
  - delegation and mandate
  - approval and evidence
  bindings:
  - HTTP
  - JSON-RPC
  - gRPC
  - events/webhooks
  profiles:
  - MCP
  - A2A
  - web auth
  - FIDES/TAP-family
  - x402
  - MPP
  - AP2
  domain_families:
  - provisioning
  - commerce
  - jobs
